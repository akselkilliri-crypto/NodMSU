name: Build ESP32 Firmware with Patched lib

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Download patched libnet80211.a
        run: |
          wget -O libnet80211.a https://github.com/Hex2424/esp32_deauth_patch/raw/main/ESP32_ARDUINO_2.0.9/libnet80211.a

      - name: Patch the library before build
        run: |
          # Путь к установленному пакету framework-arduinoespressif32
          FRAMEWORK_DIR=$HOME/.platformio/packages/framework-arduinoespressif32
          # Возможные расположения целевого файла
          TARGET_PATHS=(
            "$FRAMEWORK_DIR/tools/sdk/esp32/lib/libnet80211.a"
            "$FRAMEWORK_DIR/tools/sdk/lib/libnet80211.a"
          )
          PATCHED_FILE="$GITHUB_WORKSPACE/libnet80211.a"
          for target in "${TARGET_PATHS[@]}"; do
            if [ -f "$target" ]; then
              cp "$PATCHED_FILE" "$target"
              echo "Patched $target"
              break
            fi
          done

      - name: Build firmware
        run: pio run

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: esp32-deauth-firmware
          path: .pio/build/nodemcu-32s/firmware.bin
